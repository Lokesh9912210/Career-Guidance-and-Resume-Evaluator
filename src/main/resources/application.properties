# ==============================
# SERVER
# ==============================
server.port=8080
spring.profiles.active=dev

# ==============================
# DATABASE (MySQL - LOCAL)
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/myproject?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Password9912@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==============================
# JWT
# ==============================
jwt.secret=your_secret_key_here
jwt.expiration=86400000

# ==============================
# MAIL (GMAIL SMTP)
# ==============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==============================
# O*NET API
# ==============================
onet.api.base-url=https://services.onetcenter.org/ws
onet.api.username=your_onet_username
onet.api.password=your_onet_password

# ==============================
# ADZUNA JOB API
# ==============================
adzuna.api.base-url=https://api.adzuna.com/v1/api
adzuna.api.app-id=your_app_id
adzuna.api.app-key=your_app_key

# ==============================
# MAKE.COM WEBHOOK
# ==============================
make.webhook.url=https://dummy-webhook-url.com/webhook
make.webhook.resume-url=https://dummy-webhook-url.com/resume

# ==============================
# FILE UPLOAD
# ==============================
file.upload-dir=uploads

# ==============================
# CORS
# ==============================
app.cors.allowed-origins=*
