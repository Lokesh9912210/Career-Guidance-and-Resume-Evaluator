# ==============================
# SERVER
# ==============================
server.port=${PORT:8080}
spring.profiles.active=prod

# ==============================
# DATABASE (Render PostgreSQL)
# ==============================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ==============================
# JWT
# ==============================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ==============================
# MAIL (GMAIL SMTP)
# ==============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==============================
# O*NET API
# ==============================
onet.api.base-url=https://services.onetcenter.org/ws
onet.api.username=${ONET_API_USERNAME}
onet.api.password=${ONET_API_PASSWORD}

# ==============================
# ADZUNA JOB API
# ==============================
adzuna.api.base-url=https://api.adzuna.com/v1/api
adzuna.api.app-id=${ADZUNA_APP_ID}
adzuna.api.app-key=${ADZUNA_APP_KEY}

# ==============================
# MAKE.COM WEBHOOK (DUMMY)
# ==============================
make.webhook.url=https://dummy-webhook-url.com/webhook
make.webhook.resume-url=https://dummy-webhook-url.com/resume

# ==============================
# FILE UPLOAD
# ==============================
file.upload-dir=${FILE_UPLOAD_DIR:/tmp/uploads}

# ==============================
# CORS (Frontend URL)
# ==============================
app.cors.allowed-origins=${FRONTEND_URL:*}
