# ===============================
# SERVER CONFIG
# ===============================
# Render / cloud will inject PORT
# Local will fallback to 8080
server.port=${PORT:8080}

# ===============================
# ACTIVE PROFILE
# ===============================
# Keep prod for cloud, safe for Google
spring.profiles.active=prod

# ===============================
# JPA COMMON CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads

# ===============================
# JWT CONFIG
# ===============================
# Secret MUST come from environment variables
# Local fallback prevents app crash (safe dummy)
jwt.secret=${JWT_SECRET:change-me-locally}
jwt.expiration=86400000

# ===============================
# MAIL CONFIG
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:no-reply@example.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:dummy}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# O*NET API CONFIG
# ===============================
onet.api.base-url=https://services.onetcenter.org/ws
onet.api.username=${ONET_API_USERNAME:dummy}
onet.api.password=${ONET_API_PASSWORD:dummy}

# ===============================
# ADZUNA API CONFIG
# ===============================
adzuna.api.base-url=https://api.adzuna.com/v1/api
adzuna.api.app-id=${ADZUNA_APP_ID:dummy}
adzuna.api.app-key=${ADZUNA_APP_KEY:dummy}

# ===============================
# MAKE WEBHOOK
# ===============================
make.webhook.url=${MAKE_WEBHOOK_URL:https://example.com}
make.webhook.resume-url=${MAKE_WEBHOOK_RESUME_URL:https://example.com}

# ===============================
# CORS CONFIG
# ===============================
# Single stable frontend domain only
app.cors.allowed-origins=https://career-guidance-and-resume-evaluator.vercel.app
